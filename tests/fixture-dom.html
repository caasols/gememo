<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>MM2C DOM Fixture</title></head>
<body>
<script>
  window.MM2C_FIXTURE_MODE = true;
  window.MM2C_SKIP_AUTORUN = true;

  // Minimal chrome API stub so content_meet.js loads without throwing.
  window.chrome = {
    runtime: { onMessage: { addListener: () => {} }, lastError: null },
    storage: {
      local: {
        get: () => Promise.resolve({}),
        set: () => Promise.resolve(),
        remove: () => Promise.resolve(),
      },
      onChanged: { addListener: () => {} },
    },
  };
</script>
<script src="../extension/design_tokens.js"></script>
<script src="../extension/constants.js"></script>
<script src="../extension/content_meet.js"></script>
<script>
  window.MM2C_DOM_TESTS = (() => {
    const results = [];

    function assert(label, condition, detail = '') {
      const ok = !!condition;
      results.push({ ok, label, detail });
      console[ok ? 'log' : 'error'](`${ok ? '✅' : '❌'} ${label}${detail ? ' — ' + detail : ''}`);
    }

    function assertEq(label, actual, expected) {
      const ok = JSON.stringify(actual) === JSON.stringify(expected);
      const detail = ok ? '' : `expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`;
      results.push({ ok, label, detail });
      console[ok ? 'log' : 'error'](`${ok ? '✅' : '❌'} ${label}${detail ? ' — ' + detail : ''}`);
    }

    async function withFixture(html, fn) {
      const container = document.createElement('div');
      container.innerHTML = html;
      document.body.appendChild(container);
      try { await fn(container); }
      finally { container.remove(); }
    }

    async function run() {
      results.length = 0;
      const { getMeetingTitle, getAttendeeNames, getGeminiTriggerElement, getLeaveButton, isRecording,
        extractLastResponse, waitForResponseComplete, injectPromptWithVerification } =
        window.MM2C_SELECTORS;
      const savedTitle = document.title;

      // ── getMeetingTitle ──────────────────────────────────────────────────────
      console.group('getMeetingTitle');

      document.title = 'Meet - Sprint Planning';
      assertEq('scheduled meeting title extracted', getMeetingTitle(), 'Sprint Planning');

      document.title = 'Meet – Q3 Review'; // em-dash
      assertEq('em-dash variant extracted', getMeetingTitle(), 'Q3 Review');

      document.title = 'Meet - abc-defg-hij'; // room code — personal Meet link
      assertEq('room code returns readable label', getMeetingTitle(), 'Personal meeting (abc-defg-hij)');

      document.title = 'Google Meet';
      await withFixture('<div data-meeting-title="Roadmap sync"></div>', () => {
        assertEq('DOM data-meeting-title fallback used', getMeetingTitle(), 'Roadmap sync');
      });

      document.title = 'Google Meet';
      assertEq('no usable title returns empty string', getMeetingTitle(), '');

      document.title = savedTitle;
      console.groupEnd();

      // ── getAttendeeNames ─────────────────────────────────────────────────────
      console.group('getAttendeeNames');

      await withFixture(`
        <div data-participant-id="1"><span data-self-name="Alice"></span></div>
        <div data-participant-id="2"><span data-self-name="Bob"></span></div>
      `, () => {
        const names = getAttendeeNames();
        assert('two participants extracted', names.length === 2);
        assert('Alice in result', names.includes('Alice'));
        assert('Bob in result', names.includes('Bob'));
      });

      await withFixture(`
        <div data-participant-id="1"><span data-self-name="Alice"></span></div>
        <div data-participant-id="2"><span data-self-name="Alice"></span></div>
      `, () => {
        assertEq('duplicate name deduplicated', getAttendeeNames(), ['Alice']);
      });

      await withFixture(`
        <div data-participant-id="1"><span data-self-name="123"></span></div>
      `, () => {
        assertEq('numeric string ignored', getAttendeeNames(), []);
      });

      await withFixture(`
        <div data-participant-id="1"><span data-self-name=""></span></div>
      `, () => {
        assertEq('empty name ignored', getAttendeeNames(), []);
      });

      console.groupEnd();

      // ── getGeminiTriggerElement ──────────────────────────────────────────────
      console.group('getGeminiTriggerElement');

      await withFixture('<button aria-label="Gemini"></button>', () => {
        assert('aria-label button returns element', !!getGeminiTriggerElement());
      });

      // Meet 2026-06 toggles by stable jsname: wptEcf (off) and J4YcA (active).
      await withFixture('<button jsname="wptEcf" aria-label="Gemini can\'t answer your questions at the moment"><i class="google-symbols">spark_off</i></button>', () => {
        assert('off-state wptEcf toggle returns element', getGeminiTriggerElement()?.getAttribute('jsname') === 'wptEcf');
      });

      await withFixture('<button jsname="J4YcA" aria-label="Gemini uses meeting conversations to answer questions"></button>', () => {
        assert('active-state J4YcA toggle returns element', getGeminiTriggerElement()?.getAttribute('jsname') === 'J4YcA');
      });

      // "Take notes with Gemini" (jsname ocqpFe, NO aria-label) is a DIFFERENT
      // feature — it must NOT be returned (clicking it was the activation bug).
      await withFixture('<div role="button" jsname="ocqpFe"><i class="google-symbols">pen_spark</i>Take notes with Gemini</div>', () => {
        assert('"Take notes with Gemini" decoy is NOT matched', getGeminiTriggerElement() === null);
      });

      await withFixture('', () => {
        assert('returns null when no trigger present', getGeminiTriggerElement() === null);
      });

      console.groupEnd();

      // ── getLeaveButton ───────────────────────────────────────────────────────
      console.group('getLeaveButton');

      await withFixture('<button aria-label="Leave call"></button>', () => {
        assert('Leave call button found', !!getLeaveButton());
      });

      await withFixture('', () => {
        assert('returns null when absent', getLeaveButton() === null);
      });

      console.groupEnd();

      // ── isRecording (P9-A3c) ─────────────────────────────────────────────────
      console.group('isRecording');

      await withFixture('', () => {
        assert('no recording indicator → false', isRecording() === false);
      });

      await withFixture('<div aria-label="This meeting is being recorded"></div>', () => {
        assert('"is being recorded" aria-label → true', isRecording() === true);
      });

      await withFixture('<span aria-label="Recording"></span>', () => {
        assert('Recording aria-label (case-insensitive) → true', isRecording() === true);
      });

      await withFixture('<div data-tooltip="Stop recording"></div>', () => {
        assert('data-tooltip recording → true', isRecording() === true);
      });

      console.groupEnd();

      // ── extractLastResponse (REAL wiring: lastGeminiResponseEl → clean) ───────
      // Exercises the SHIPPING function (not a tests.js copy) end-to-end against
      // realistic Meet 2026-06 DOM, so the response-location + extraction logic
      // that broke on past redesigns is covered by the code that actually runs.
      console.group('extractLastResponse (real content_meet wiring)');

      // Block-level rows so innerText has predictable newlines, with the real
      // trailing action line (Copy → Report) that cleanGeminiResponse strips.
      const reply = (answer) =>
        '<div role="listitem"><div>Gemini response</div><div>' + answer + '</div>' +
        '<div><button jsname="WmNl5c"><span>Copy</span></button></div><div>Report</div></div>';

      await withFixture('<div role="list">' + reply('The roadmap is on track for Q3.') + '</div>', () => {
        const out = extractLastResponse();
        assert('extracts the cleaned answer from the listitem reply',
          out && out.includes('The roadmap is on track for Q3') && !/Copy|Gemini response/i.test(out),
          `got: ${JSON.stringify(out)}`);
      });

      await withFixture('<div role="list">' + reply('First answer here, long enough.') + reply('Second and latest answer.') + '</div>', () => {
        const out = extractLastResponse();
        assert('returns the LAST reply, not an earlier one',
          out && out.includes('Second and latest answer') && !out.includes('First answer'),
          `got: ${JSON.stringify(out)}`);
      });

      await withFixture('', () => {
        const out = extractLastResponse();
        assert('no reply present → no answer (falsy)', !out, `got: ${JSON.stringify(out)}`);
      });

      await withFixture(
        '<aside aria-label="Side panel"><div>Gemini response</div><div>Legacy side-panel answer.</div>' +
        '<div><button jsname="WmNl5c"><span>Copy</span></button></div><div>Report</div></aside>', () => {
        const out = extractLastResponse();
        assert('falls back to the legacy side panel when no listitems',
          out && out.includes('Legacy side-panel answer') && !/Copy/i.test(out),
          `got: ${JSON.stringify(out)}`);
      });

      console.groupEnd();

      // ── waitForResponseComplete (REAL streaming-completion state machine) ─────
      // The async completion logic (resolve on Copy button, no premature finish on
      // a prior answer, timeout) is otherwise untested against the real code.
      console.group('waitForResponseComplete (real streaming state machine)');

      await withFixture('<div role="list">' + reply('A complete answer that is well over ten chars.') + '</div>', async () => {
        let resolved = false;
        await waitForResponseComplete(2000).then(() => { resolved = true; }).catch(() => {});
        assert('resolves immediately when the latest reply already has its Copy button', resolved);
      });

      await withFixture('', async () => {
        let rejected = false;
        await waitForResponseComplete(150).then(() => {}).catch(() => { rejected = true; });
        assert('rejects (times out) when no Gemini reply ever appears', rejected);
      });

      await withFixture(
        '<div role="list"><div role="listitem" id="streaming"><div>Gemini response</div><div>Partial streamed answer text…</div></div></div>',
        async (c) => {
          const li = c.querySelector('#streaming');
          const p = waitForResponseComplete(2000);
          // Simulate streaming completing: the Copy button appears a tick later.
          setTimeout(() => {
            const btn = document.createElement('button');
            btn.setAttribute('jsname', 'WmNl5c');
            btn.innerHTML = '<span>Copy</span>';
            li.appendChild(btn);
          }, 50);
          let resolved = false;
          await p.then(() => { resolved = true; }).catch(() => {});
          assert('does not finish early on a streaming reply, then resolves once Copy appears', resolved);
        });

      // Live-confirmed regression (2026-06-10): Meet inserts the Copy button HIDDEN
      // (width 0) during streaming and only makes it VISIBLE at completion. A
      // present-but-hidden Copy must NOT finish the wait; revealing it must.
      await withFixture(
        '<div role="list"><div role="listitem" id="hidden-copy"><div>Gemini response</div><div>Streaming answer…</div>' +
        '<button jsname="WmNl5c" style="display:none"><span>Copy</span></button></div></div>',
        async (c) => {
          const btn = c.querySelector('#hidden-copy button[jsname="WmNl5c"]');
          const p = waitForResponseComplete(2500);
          // Reveal the button (Meet finishing) + a childList mutation so the observer fires.
          setTimeout(() => {
            btn.style.display = '';
            c.querySelector('#hidden-copy').appendChild(document.createTextNode(' '));
          }, 60);
          let resolved = false;
          await p.then(() => { resolved = true; }).catch(() => {});
          assert('waits while Copy is present-but-HIDDEN, resolves when it becomes VISIBLE', resolved);
        });

      console.groupEnd();

      // ── injectPromptWithVerification (REAL function, exposed via MM2C_FIXTURE_MODE) ──
      // Replaces the deleted tests.js DI copy. Drives the SHIPPING function across its
      // three branches deterministically: execCommand success, execCommand→textContent
      // fallback, and both-paths-fail throw. (sendLog is a no-op offline because
      // isContextValid() is false, so the real function runs cleanly here.)
      console.group('injectPromptWithVerification (real content_meet)');

      // Happy path: a writable Ask Gemini input → resolves with the prompt present.
      await withFixture('<div aria-label="Ask Gemini" contenteditable="true" role="textbox"></div>', async (c) => {
        const el = c.querySelector('div[aria-label="Ask Gemini"][contenteditable="true"]');
        let ok = false;
        await injectPromptWithVerification(el, 'PROMPT BODY TEXT', Date.now() + 5000)
          .then(() => { ok = true; }).catch(() => {});
        assert('resolves on a writable input', ok);
        assert('input contains the injected prompt',
          (el.textContent || '').includes('PROMPT BODY TEXT'), `got: ${JSON.stringify(el.textContent)}`);
      });

      // Fallback: execCommand is a no-op → Path A leaves it empty → real Path B (textContent) runs.
      await withFixture('<div aria-label="Ask Gemini" contenteditable="true" role="textbox"></div>', async (c) => {
        const el = c.querySelector('div[aria-label="Ask Gemini"][contenteditable="true"]');
        const realExec = document.execCommand;
        document.execCommand = () => false;
        let ok = false;
        try {
          await injectPromptWithVerification(el, 'FALLBACK PROMPT', Date.now() + 5000)
            .then(() => { ok = true; }).catch(() => {});
        } finally { document.execCommand = realExec; }
        assert('fallback (textContent) path resolves when execCommand is a no-op', ok);
        assert('fallback path populated the input', (el.textContent || '').includes('FALLBACK PROMPT'));
      });

      // Throw: both paths leave the input empty → real function rejects with InjectionTimeoutError.
      await withFixture('<div aria-label="Ask Gemini" contenteditable="true" role="textbox"></div>', async (c) => {
        const el = c.querySelector('div[aria-label="Ask Gemini"][contenteditable="true"]');
        const realExec = document.execCommand;
        document.execCommand = () => false;
        Object.defineProperty(el, 'textContent', { configurable: true, get() { return ''; }, set() {} });
        let err = null;
        try {
          await injectPromptWithVerification(el, 'WILL FAIL', Date.now() + 5000)
            .then(() => {}).catch(e => { err = e; });
        } finally { document.execCommand = realExec; }
        assert('rejects when both injection paths leave the input empty', !!err);
        assert('throws the injection-failure error',
          !!err && /Failed to inject prompt/.test(err.message || ''), `got: ${err && err.message}`);
      });

      console.groupEnd();

      // ── Re-injection guard ───────────────────────────────────────────────────
      // content_meet.js sets window.__mm2cLoaded so the background onInstalled
      // injector can probe it and avoid double-injecting into a live tab.
      console.group('re-injection guard');
      assert('content_meet sets window.__mm2cLoaded', window.__mm2cLoaded === true);
      // Minimal no-op check: with the flag already set, the guard's early-return
      // expression short-circuits to 'skip' (full re-injection isn't fixture-feasible).
      assertEq('guard short-circuits on re-run (flag set → skip)',
        (window.__mm2cLoaded ? 'skip' : 'run'), 'skip');
      console.groupEnd();

      const passed = results.filter(r => r.ok).length;
      return { passed, total: results.length, results };
    }

    return { run };
  })();
</script>
</body>
</html>
